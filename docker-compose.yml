services:
  postgres:
    image: postgres:16
    container_name: oficina_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina
      POSTGRES_DB: oficina
    ports:
      - "5433:5432"
    volumes:
      - oficina_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina -d oficina"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  oficina_pgdata:
